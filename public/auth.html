<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #e58e26;
        --text-color: #333;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Poppins", sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #fdfbfb, #ebedee);
        padding: 20px;
      }
      .auth-card {
        background-color: white;
        padding: 30px 25px;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }
      .auth-card h2 {
        margin-bottom: 20px;
        color: #333;
      }
      .auth-card input {
        width: 100%;
        padding: 12px;
        margin: 8px 0;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
      }
      .auth-card button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        background: var(--primary-color);
        color: white;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      .auth-card .link {
        margin-top: 12px;
        display: block;
        color: #007bff;
        cursor: pointer;
        text-decoration: underline;
        font-size: 14px;
      }
      .home-link {
        margin-top: 25px;
        text-decoration: none;
        color: var(--text-color);
        font-weight: 500;
      }
      .home-link:hover {
        color: var(--primary-color);
      }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <div id="register-page">
        <h2>Register</h2>
        <input
          type="text"
          id="reg-username"
          placeholder="Choose Username"
          required
        />
        <input type="email" id="reg-email" placeholder="Enter Email" required />
        <input
          type="password"
          id="reg-password"
          placeholder="Choose Password"
          required
        />
        <button onclick="register()">Register</button>
        <span class="link" onclick="showLogin()"
          >Already have an account? Login</span
        >
      </div>
      <div id="login-page" style="display: none">
        <h2>Login</h2>
        <input
          type="email"
          id="login-email"
          placeholder="Enter Email"
          required
        />
        <input
          type="password"
          id="login-password"
          placeholder="Enter Password"
          required
        />
        <button onclick="login()">Login</button>
        <span class="link" onclick="resetPassword()">Forgot Password?</span>
        <span class="link" onclick="showRegister()"
          >Don't have an account? Register</span
        >
      </div>
    </div>
    <a href="index.html" class="home-link">← Back to Home</a>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyAVA1Q0kk1xFEexc_gcbLB27e1yjjcwtyk",
        authDomain: "pancake-2ffda.firebaseapp.com",
        projectId: "pancake-2ffda",
        storageBucket: "pancake-2ffda.firebasestorage.app",
        messagingSenderId: "877111104903",
        appId: "1:877111104903:web:5a87f507c94fdebaa26f22",
        measurementId: "G-Q1RP1G83ME",
      };

      firebase.initializeApp(firebaseConfig);
      const auth = firebase.auth();
      const db = firebase.firestore();

      function showLogin() {
        document.getElementById("register-page").style.display = "none";
        document.getElementById("login-page").style.display = "block";
      }
      function showRegister() {
        document.getElementById("login-page").style.display = "none";
        document.getElementById("register-page").style.display = "block";
      }

      function register() {
        const username = document.getElementById("reg-username").value;
        const email = document.getElementById("reg-email").value;
        const password = document.getElementById("reg-password").value;
        if (!username || !email || !password) {
          alert("Please fill in all fields.");
          return;
        }
        if (password.length < 6) {
          alert("Password must be at least 6 characters long.");
          return;
        }

        // Create user in Firebase Auth
        auth
          .createUserWithEmailAndPassword(email, password)
          .then((userCredential) => {
            // After creating the user, save their name to the Firestore database
            const user = userCredential.user;
            return db.collection("users").doc(user.uid).set({
              name: username,
              email: email,
            });
          })
          .then(() => {
            // After saving to database is successful
            localStorage.setItem("username", username); // Also save to local storage
            alert("Registration successful! Please login.");
            showLogin();
          })
          .catch((error) => {
            alert(error.message);
          });
      }

      function login() {
        const email = document.getElementById("login-email").value;
        const password = document.getElementById("login-password").value;

        // Sign in the user with Firebase Auth
        auth
          .signInWithEmailAndPassword(email, password)
          .then((userCredential) => {
            // After successful login, get the user's unique ID
            const user = userCredential.user;
            // Use the ID to fetch the user's document from the database
            return db.collection("users").doc(user.uid).get();
          })
          .then((doc) => {
            if (doc.exists) {
              // The user's document was found! Get their real name.
              const username = doc.data().name;
              // THIS IS THE FIX: Save the REAL username from the database
              localStorage.setItem("username", username);
            } else {
              // Fallback if no name was saved during registration
              const username = document
                .getElementById("login-email")
                .value.split("@")[0];
              localStorage.setItem("username", username);
            }
            // Now, redirect to the app
            window.location.href = "index.html";
          })
          .catch((error) => {
            alert("Invalid email or password! " + error.message);
          });
      }
      // resetPassword function remains the same
      function resetPassword() {
        const email = prompt("Please enter your email to reset your password:");
        if (email) {
          auth
            .sendPasswordResetEmail(email)
            .then(() => {
              alert("Password reset email sent!");
            })
            .catch((error) => {
              alert(error.message);
            });
        }
      }
    </script>
  </body>
</html>
